# fly.toml for the AutoCurb dealer dashboard (Next.js).
#
# Deploy:
#   fly launch --no-deploy --copy-config --dockerfile Dockerfile \
#       --name autocurb-web
#   fly secrets set \
#     FSBO_API_URL=https://autocurb-api.fly.dev
#   fly deploy

app = "autocurb-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "get"
    path = "/login"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["app"]
