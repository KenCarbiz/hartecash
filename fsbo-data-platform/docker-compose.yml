services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fsbo
      POSTGRES_PASSWORD: fsbo
      POSTGRES_DB: fsbo
    ports:
      - "5432:5432"
    volumes:
      - fsbo_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  fsbo_pg:
